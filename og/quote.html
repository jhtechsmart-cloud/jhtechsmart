<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>OG · Quote</title>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{width:1200px;height:630px;overflow:hidden}
  body{
    font-family:'Pretendard Variable',Pretendard,'Apple SD Gothic Neo','Noto Sans KR',sans-serif;
    background:linear-gradient(135deg,#0d3778 0%,#1748b0 55%,#1e56c8 100%);
    color:#fff;
    position:relative;
    display:flex;
    align-items:center;
    padding:0 80px;
    -webkit-font-smoothing:antialiased;
  }
  .blob-tr{position:absolute;width:720px;height:720px;border-radius:50%;top:-280px;right:-220px;background:radial-gradient(circle,rgba(255,255,255,0.10) 0%,transparent 65%)}
  .blob-bl{position:absolute;width:520px;height:520px;border-radius:50%;bottom:-200px;left:-160px;background:radial-gradient(circle,rgba(249,115,22,0.22) 0%,transparent 65%)}
  .grid{position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,0.04) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.04) 1px,transparent 1px);background-size:64px 64px;mask-image:radial-gradient(circle at 30% 50%,#000 0%,transparent 75%)}
  .content{position:relative;z-index:2;max-width:740px}
  .tag{display:inline-flex;align-items:center;gap:10px;background:rgba(255,255,255,0.14);border:1px solid rgba(255,255,255,0.24);padding:10px 20px;border-radius:999px;font-size:20px;font-weight:600;letter-spacing:.2px;margin-bottom:32px;backdrop-filter:blur(8px)}
  .tag .dot{width:8px;height:8px;border-radius:50%;background:#fbbf24;box-shadow:0 0 12px #fbbf24}
  h1{font-size:96px;line-height:1.05;letter-spacing:-3px;font-weight:800;margin-bottom:28px;text-shadow:0 4px 24px rgba(0,0,0,0.18)}
  h1 .em{color:#fbbf24}
  .subtitle{font-size:30px;font-weight:500;line-height:1.45;opacity:.95;margin-bottom:52px;letter-spacing:-.5px}
  .features{display:flex;gap:14px;margin-bottom:48px}
  .feature{background:rgba(255,255,255,0.10);border:1px solid rgba(255,255,255,0.18);padding:12px 22px;border-radius:14px;font-size:20px;font-weight:600;letter-spacing:-.3px}
  .footer{display:flex;align-items:center;gap:18px}
  .footer .bar{width:5px;height:36px;background:#f97316;border-radius:3px;box-shadow:0 0 16px rgba(249,115,22,0.6)}
  .footer .company{font-size:28px;font-weight:700;letter-spacing:-.4px}
  .right{position:absolute;right:80px;top:50%;transform:translateY(-50%);z-index:2}
  .badge{width:300px;height:300px;background:rgba(255,255,255,0.96);border-radius:48px;box-shadow:0 30px 80px rgba(0,0,0,0.35),0 0 0 1px rgba(255,255,255,0.5) inset;display:flex;align-items:center;justify-content:center;overflow:hidden;padding:38px}
  .badge img{width:100%;height:100%;object-fit:contain}
</style>
</head>
<body>
  <div class="blob-tr"></div>
  <div class="blob-bl"></div>
  <div class="grid"></div>
  <div class="content">
    <div class="tag"><span class="dot"></span>2026 소공인 스마트제조 지원사업</div>
    <h1>장비 견적<br><span class="em">간편 신청</span></h1>
    <div class="subtitle">자가진단부터 맞춤 장비 추천까지<br>5단계로 끝내는 견적 신청</div>
    <div class="features">
      <div class="feature">자가진단</div>
      <div class="feature">공정분석</div>
      <div class="feature">장비추천</div>
    </div>
    <div class="footer">
      <div class="bar"></div>
      <div class="company">(주)재현테크</div>
    </div>
  </div>
  <div class="right">
    <div class="badge"><img src="../logo.png" alt="logo"></div>
  </div>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>jhtechsmart — Develop Note</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/github.min.css" id="hljs-light">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/github-dark.min.css" id="hljs-dark" disabled>
<script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked@12.0.0/marked.min.js"></script>
<style>
  :root {
    --bg: #ffffff;
    --bg-secondary: #f8fafc;
    --bg-tertiary: #f1f5f9;
    --border: #e2e8f0;
    --border-strong: #cbd5e1;
    --text: #0f172a;
    --text-secondary: #475569;
    --text-muted: #94a3b8;
    --accent: #2563eb;
    --accent-soft: #eff6ff;
    --success: #16a34a;
    --warning: #ea580c;
    --danger: #dc2626;
    --info: #0891b2;
    --code-bg: #f8fafc;
    --shadow: 0 1px 3px 0 rgb(0 0 0 / 0.06), 0 1px 2px -1px rgb(0 0 0 / 0.06);
    --sidebar-w: 320px;
  }
  [data-theme="dark"] {
    --bg: #0a0a0a;
    --bg-secondary: #111111;
    --bg-tertiary: #1a1a1a;
    --border: #262626;
    --border-strong: #404040;
    --text: #fafafa;
    --text-secondary: #a1a1aa;
    --text-muted: #71717a;
    --accent: #60a5fa;
    --accent-soft: #1e293b;
    --code-bg: #18181b;
    --shadow: 0 1px 3px 0 rgb(0 0 0 / 0.3), 0 1px 2px -1px rgb(0 0 0 / 0.3);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    font-family: 'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    overflow: hidden;
    font-feature-settings: "ss06" on, "cv11" on;
    -webkit-font-smoothing: antialiased;
  }
  .app { display: flex; height: 100vh; }

  /* ─── Sidebar ─── */
  .sidebar {
    width: var(--sidebar-w);
    background: var(--bg-secondary);
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column;
    flex-shrink: 0;
  }
  .sidebar-header {
    padding: 20px 20px 16px;
    border-bottom: 1px solid var(--border);
  }
  .sidebar-title {
    font-size: 13px;
    font-weight: 500;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 6px;
  }
  .sidebar-project {
    font-size: 18px;
    font-weight: 700;
    color: var(--text);
    word-break: break-word;
  }
  .sidebar-stats {
    margin-top: 12px;
    display: flex;
    gap: 12px;
    font-size: 12px;
    color: var(--text-muted);
  }
  .sidebar-stats span strong { color: var(--text-secondary); font-weight: 600; }

  .search-box {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
  }
  .search-input {
    width: 100%;
    padding: 8px 12px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: inherit;
    font-size: 13px;
    outline: none;
    transition: border-color 0.15s;
  }
  .search-input:focus { border-color: var(--accent); }

  .sidebar-list { flex: 1; overflow-y: auto; padding: 8px 0; }
  .sidebar-list::-webkit-scrollbar { width: 8px; }
  .sidebar-list::-webkit-scrollbar-track { background: transparent; }
  .sidebar-list::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 4px; }

  .date-group { margin-bottom: 2px; }
  .date-header {
    display: flex; align-items: center; gap: 6px;
    padding: 8px 16px;
    cursor: pointer;
    user-select: none;
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    transition: background 0.15s;
  }
  .date-header:hover { background: var(--bg-tertiary); }
  .date-toggle {
    display: inline-block;
    width: 12px; height: 12px;
    transition: transform 0.2s;
    color: var(--text-muted);
    flex-shrink: 0;
  }
  .date-group.collapsed .date-toggle { transform: rotate(-90deg); }
  .date-label { flex: 1; }
  .date-count {
    font-size: 11px;
    color: var(--text-muted);
    background: var(--bg-tertiary);
    padding: 2px 6px;
    border-radius: 10px;
    font-weight: 500;
  }
  .feature-list {
    list-style: none;
    overflow: hidden;
    max-height: 1000px;
    transition: max-height 0.25s ease;
  }
  .date-group.collapsed .feature-list { max-height: 0; }
  .feature-item {
    padding: 7px 16px 7px 36px;
    cursor: pointer;
    font-size: 13px;
    color: var(--text-secondary);
    display: flex; align-items: center; gap: 8px;
    transition: background 0.12s, color 0.12s;
    border-left: 2px solid transparent;
  }
  .feature-item:hover { background: var(--bg-tertiary); color: var(--text); }
  .feature-item.active {
    background: var(--accent-soft);
    color: var(--accent);
    border-left-color: var(--accent);
    font-weight: 500;
  }
  .feature-type-badge {
    font-size: 10px;
    font-weight: 600;
    padding: 1px 6px;
    border-radius: 4px;
    text-transform: uppercase;
    letter-spacing: 0.03em;
    flex-shrink: 0;
  }
  .feature-type-badge.feat { background: #dcfce7; color: #166534; }
  .feature-type-badge.fix { background: #fee2e2; color: #991b1b; }
  .feature-type-badge.refactor { background: #fef3c7; color: #92400e; }
  .feature-type-badge.docs { background: #dbeafe; color: #1e40af; }
  .feature-type-badge.test { background: #f3e8ff; color: #6b21a8; }
  .feature-type-badge.chore { background: #f1f5f9; color: #475569; }
  .feature-type-badge.perf { background: #ccfbf1; color: #115e59; }
  .feature-type-badge.style { background: #fce7f3; color: #9d174d; }
  .feature-type-badge.build, .feature-type-badge.ci { background: #e0e7ff; color: #3730a3; }
  [data-theme="dark"] .feature-type-badge.feat { background: #14532d; color: #86efac; }
  [data-theme="dark"] .feature-type-badge.fix { background: #7f1d1d; color: #fca5a5; }
  [data-theme="dark"] .feature-type-badge.refactor { background: #78350f; color: #fcd34d; }
  [data-theme="dark"] .feature-type-badge.docs { background: #1e3a8a; color: #93c5fd; }
  [data-theme="dark"] .feature-type-badge.test { background: #581c87; color: #d8b4fe; }
  [data-theme="dark"] .feature-type-badge.chore { background: #1e293b; color: #cbd5e1; }
  [data-theme="dark"] .feature-type-badge.perf { background: #134e4a; color: #5eead4; }
  [data-theme="dark"] .feature-type-badge.style { background: #831843; color: #f9a8d4; }
  [data-theme="dark"] .feature-type-badge.build,
  [data-theme="dark"] .feature-type-badge.ci { background: #312e81; color: #a5b4fc; }
  .feature-title-text {
    flex: 1;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .sidebar-footer {
    border-top: 1px solid var(--border);
    padding: 12px 16px;
    display: flex; justify-content: space-between; align-items: center;
    font-size: 11px;
    color: var(--text-muted);
  }
  .theme-toggle {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-secondary);
    cursor: pointer;
    padding: 4px 10px;
    border-radius: 6px;
    font-family: inherit;
    font-size: 11px;
    transition: all 0.15s;
  }
  .theme-toggle:hover { background: var(--bg-tertiary); color: var(--text); }

  /* ─── Main content ─── */
  .main {
    flex: 1;
    overflow-y: auto;
    background: var(--bg);
  }
  .main::-webkit-scrollbar { width: 10px; }
  .main::-webkit-scrollbar-track { background: transparent; }
  .main::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 5px; }

  .content {
    max-width: 880px;
    margin: 0 auto;
    padding: 48px 56px 96px;
  }

  .empty-state {
    height: 100%;
    display: flex; flex-direction: column;
    justify-content: center; align-items: center;
    color: var(--text-muted);
    text-align: center;
    padding: 40px;
  }
  .empty-state h2 { font-size: 22px; font-weight: 600; color: var(--text-secondary); margin-bottom: 10px; }
  .empty-state p { font-size: 14px; max-width: 420px; line-height: 1.6; }

  .feature-header { margin-bottom: 32px; padding-bottom: 24px; border-bottom: 1px solid var(--border); }
  .breadcrumb {
    font-size: 13px;
    color: var(--text-muted);
    margin-bottom: 10px;
    display: flex; align-items: center; gap: 8px;
    flex-wrap: wrap;
  }
  .breadcrumb-item { color: var(--text-muted); }
  .breadcrumb-sep { color: var(--border-strong); }
  .feature-h1 {
    font-size: 30px;
    font-weight: 700;
    letter-spacing: -0.02em;
    line-height: 1.25;
    margin-bottom: 16px;
    color: var(--text);
  }
  .meta-row {
    display: flex; flex-wrap: wrap; gap: 8px 16px;
    font-size: 13px;
    color: var(--text-muted);
    align-items: center;
  }
  .meta-row .status-badge {
    padding: 2px 10px;
    border-radius: 12px;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  .status-badge.completed { background: #dcfce7; color: #166534; }
  .status-badge.in-progress { background: #fef3c7; color: #92400e; }
  .status-badge.blocked { background: #fee2e2; color: #991b1b; }
  [data-theme="dark"] .status-badge.completed { background: #14532d; color: #86efac; }
  [data-theme="dark"] .status-badge.in-progress { background: #78350f; color: #fcd34d; }
  [data-theme="dark"] .status-badge.blocked { background: #7f1d1d; color: #fca5a5; }

  .tags-row { display: flex; gap: 6px; flex-wrap: wrap; }
  .tag {
    font-size: 11px;
    background: var(--bg-tertiary);
    color: var(--text-secondary);
    padding: 2px 8px;
    border-radius: 4px;
  }

  .section { margin-top: 36px; }
  .section-title {
    font-size: 12px;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 12px;
    display: flex; align-items: center; gap: 8px;
  }
  .section-title::before {
    content: '';
    display: inline-block;
    width: 3px; height: 14px;
    background: var(--accent);
    border-radius: 2px;
  }

  .prose {
    line-height: 1.7;
    color: var(--text);
    font-size: 15px;
  }
  .prose p { margin-bottom: 12px; }
  .prose strong { font-weight: 600; color: var(--text); }
  .prose code {
    background: var(--code-bg);
    padding: 2px 6px;
    border-radius: 4px;
    font-family: 'JetBrains Mono', 'Pretendard JP Variable', ui-monospace, SFMono-Regular, Menlo, monospace;
    font-size: 0.88em;
    border: 1px solid var(--border);
  }
  .prose pre {
    background: var(--code-bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px;
    overflow-x: auto;
    margin: 14px 0;
    font-size: 13px;
  }
  .prose pre code { background: transparent; padding: 0; border: 0; }
  .prose ul, .prose ol { margin: 8px 0 12px 24px; }
  .prose li { margin-bottom: 4px; }
  .prose blockquote {
    border-left: 3px solid var(--accent);
    padding: 8px 16px;
    background: var(--bg-secondary);
    margin: 14px 0;
    color: var(--text-secondary);
    border-radius: 0 6px 6px 0;
  }
  .prose h3 { margin-top: 24px; margin-bottom: 10px; font-size: 18px; }
  .prose h4 { margin-top: 18px; margin-bottom: 8px; font-size: 15px; color: var(--text-secondary); }

  .code-snippet {
    margin-top: 12px;
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }
  .code-snippet-header {
    background: var(--bg-tertiary);
    padding: 8px 14px;
    font-size: 12px;
    color: var(--text-muted);
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    border-bottom: 1px solid var(--border);
    display: flex; justify-content: space-between; align-items: center;
  }
  .copy-btn {
    background: none; border: 0; color: var(--text-muted); cursor: pointer;
    font-size: 11px; font-family: inherit; padding: 2px 8px; border-radius: 4px;
    transition: all 0.15s;
  }
  .copy-btn:hover { background: var(--bg); color: var(--text); }

  .decision-card, .problem-card {
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 18px 20px;
    margin-bottom: 14px;
    background: var(--bg-secondary);
  }
  .decision-card { border-left: 4px solid var(--info); }
  .problem-card { border-left: 4px solid var(--warning); }
  .card-title { font-size: 15px; font-weight: 600; margin-bottom: 10px; }
  .card-row { margin-bottom: 8px; font-size: 14px; }
  .card-row strong { color: var(--text-secondary); font-weight: 600; }

  .changelog-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 16px; }
  .changelog-card {
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px;
    background: var(--bg-secondary);
  }
  .changelog-card h4 {
    margin: 0 0 10px;
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .changelog-card.added h4 { color: var(--success); }
  .changelog-card.changed h4 { color: var(--info); }
  .changelog-card.fixed h4 { color: var(--warning); }
  .changelog-card.removed h4 { color: var(--danger); }
  .changelog-card ul { list-style: none; padding: 0; }
  .changelog-card li {
    font-size: 13px;
    color: var(--text-secondary);
    padding: 4px 0;
    border-bottom: 1px dashed var(--border);
  }
  .changelog-card li:last-child { border-bottom: 0; }

  .next-steps li {
    display: flex; gap: 10px; align-items: flex-start;
    padding: 6px 0;
    font-size: 14px;
    color: var(--text);
    list-style: none;
  }
  .next-steps li::before {
    content: '☐';
    color: var(--text-muted);
    font-family: monospace;
  }

  .claude-hints {
    background: linear-gradient(135deg, #fef3c7 0%, #fde68a 100%);
    border: 1px solid #fbbf24;
    border-radius: 12px;
    padding: 20px 24px;
    margin-top: 36px;
  }
  [data-theme="dark"] .claude-hints {
    background: linear-gradient(135deg, #422006 0%, #3f3f00 100%);
    border-color: #a16207;
  }
  .claude-hints h3 {
    color: #92400e;
    font-size: 14px;
    margin-bottom: 10px;
    display: flex; align-items: center; gap: 8px;
  }
  [data-theme="dark"] .claude-hints h3 { color: #fde68a; }
  .claude-hints p { color: #78350f; font-size: 14px; line-height: 1.6; }
  [data-theme="dark"] .claude-hints p { color: #fef3c7; }

  /* Mobile responsive */
  .mobile-toggle {
    display: none;
    position: fixed;
    top: 12px; left: 12px;
    z-index: 100;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 12px;
    cursor: pointer;
    color: var(--text);
    box-shadow: var(--shadow);
  }
  @media (max-width: 768px) {
    .mobile-toggle { display: block; }
    .sidebar {
      position: fixed;
      left: -100%;
      top: 0;
      height: 100vh;
      z-index: 99;
      transition: left 0.25s;
      box-shadow: 0 0 20px rgba(0,0,0,0.1);
    }
    .sidebar.open { left: 0; }
    .content { padding: 64px 24px 80px; }
    .feature-h1 { font-size: 24px; }
  }
</style>
</head>
<body>
<button class="mobile-toggle" onclick="document.querySelector('.sidebar').classList.toggle('open')">☰ Menu</button>

<div class="app">
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-title">Develop Note</div>
      <div class="sidebar-project" id="sidebar-project">jhtechsmart</div>
      <div class="sidebar-stats" id="sidebar-stats">
        <span><strong id="stat-days">0</strong> days</span>
        <span><strong id="stat-features">0</strong> features</span>
      </div>
    </div>
    <div class="search-box">
      <input type="text" class="search-input" id="search-input" placeholder="검색... (제목, 내용, 태그)">
    </div>
    <nav class="sidebar-list" id="sidebar-list"></nav>
    <div class="sidebar-footer">
      <span id="last-updated">—</span>
      <button class="theme-toggle" id="theme-toggle">🌙 Dark</button>
    </div>
  </aside>

  <main class="main">
    <div class="content" id="content">
      <div class="empty-state">
        <h2>📓 개발 노트에 오신 것을 환영합니다</h2>
        <p>왼쪽 사이드바에서 날짜와 기능을 선택하면 상세 내용을 볼 수 있습니다.<br>
        매일매일 작성된 개발 기록이 누적됩니다.</p>
      </div>
    </div>
  </main>
</div>

<script>
(function() {
  'use strict';

  const dataEl = document.getElementById('dev-notes-data');
  let data;
  try {
    data = JSON.parse(dataEl.textContent);
  } catch (e) {
    console.error('Failed to parse dev notes data:', e);
    data = { project: 'Unknown', entries: [] };
  }

  // Set project name
  document.getElementById('sidebar-project').textContent = data.project || 'Project';
  document.title = (data.project || 'Project') + ' — Develop Note';

  // Stats
  document.getElementById('stat-days').textContent = data.entries.length;
  let featureCount = 0;
  data.entries.forEach(e => featureCount += (e.features || []).length);
  document.getElementById('stat-features').textContent = featureCount;

  // Last updated
  if (data.entries.length > 0) {
    const dates = data.entries.map(e => e.date).sort();
    document.getElementById('last-updated').textContent = 'Last: ' + dates[dates.length - 1];
  }

  // Theme handling
  const themeToggle = document.getElementById('theme-toggle');
  const savedTheme = localStorage.getItem('devnote-theme') || 'light';
  applyTheme(savedTheme);
  themeToggle.onclick = () => {
    const cur = document.documentElement.getAttribute('data-theme');
    const next = cur === 'dark' ? 'light' : 'dark';
    applyTheme(next);
    localStorage.setItem('devnote-theme', next);
  };
  function applyTheme(theme) {
    document.documentElement.setAttribute('data-theme', theme);
    themeToggle.textContent = theme === 'dark' ? '☀️ Light' : '🌙 Dark';
    document.getElementById('hljs-light').disabled = theme === 'dark';
    document.getElementById('hljs-dark').disabled = theme !== 'dark';
  }

  // Sort entries: newest first
  data.entries.sort((a, b) => b.date.localeCompare(a.date));

  let currentFeatureId = null;

  function renderSidebar(filter) {
    const list = document.getElementById('sidebar-list');
    list.innerHTML = '';
    filter = (filter || '').toLowerCase().trim();

    data.entries.forEach((entry, dateIdx) => {
      const features = (entry.features || []).filter(f => {
        if (!filter) return true;
        const hay = [f.title, f.context, f.implementation, (f.tags||[]).join(' '), entry.mainTask].join(' ').toLowerCase();
        return hay.includes(filter);
      });
      if (features.length === 0 && filter) return;

      const group = document.createElement('div');
      group.className = 'date-group' + (dateIdx === 0 ? '' : '');
      const header = document.createElement('div');
      header.className = 'date-header';
      header.innerHTML = `
        <svg class="date-toggle" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
        <span class="date-label">${entry.date}${entry.mainTask ? ' · ' + escapeHtml(entry.mainTask) : ''}</span>
        <span class="date-count">${features.length}</span>
      `;
      header.onclick = () => group.classList.toggle('collapsed');
      group.appendChild(header);

      const ul = document.createElement('ul');
      ul.className = 'feature-list';
      features.forEach(f => {
        const li = document.createElement('li');
        li.className = 'feature-item';
        li.dataset.featureId = f.id;
        li.innerHTML = `
          <span class="feature-type-badge ${f.type||'chore'}">${f.type||'chore'}</span>
          <span class="feature-title-text">${escapeHtml(f.title)}</span>
        `;
        li.onclick = () => selectFeature(entry, f);
        ul.appendChild(li);
      });
      group.appendChild(ul);
      list.appendChild(group);
    });
  }

  function selectFeature(entry, feature) {
    currentFeatureId = feature.id;
    document.querySelectorAll('.feature-item').forEach(el => {
      el.classList.toggle('active', el.dataset.featureId === feature.id);
    });
    renderContent(entry, feature);
    // Close sidebar on mobile
    if (window.innerWidth <= 768) {
      document.querySelector('.sidebar').classList.remove('open');
    }
    // Scroll content to top
    document.querySelector('.main').scrollTop = 0;
  }

  function renderContent(entry, feature) {
    const content = document.getElementById('content');
    const md = (s) => s ? marked.parse(s, { breaks: true }) : '';

    let html = `
      <div class="feature-header">
        <div class="breadcrumb">
          <span class="breadcrumb-item">${escapeHtml(data.project)}</span>
          <span class="breadcrumb-sep">/</span>
          <span class="breadcrumb-item">${entry.date}</span>
          <span class="breadcrumb-sep">/</span>
          <span class="breadcrumb-item">${escapeHtml(entry.mainTask || '')}</span>
        </div>
        <h1 class="feature-h1">${escapeHtml(feature.title)}</h1>
        <div class="meta-row">
          <span class="feature-type-badge ${feature.type||'chore'}">${feature.type||'chore'}${feature.scope?'('+escapeHtml(feature.scope)+')':''}</span>
          <span class="status-badge ${(feature.status||'completed').replace(/\s+/g,'-')}">${feature.status||'completed'}</span>
          ${(feature.tags && feature.tags.length) ? `<div class="tags-row">${feature.tags.map(t=>`<span class="tag">${escapeHtml(t)}</span>`).join('')}</div>` : ''}
        </div>
      </div>
    `;

    if (entry.tldr) {
      html += `<section class="section"><div class="section-title">TL;DR</div><div class="prose">${md(entry.tldr)}</div></section>`;
    }
    if (feature.context) {
      html += `<section class="section"><div class="section-title">Context</div><div class="prose">${md(feature.context)}</div></section>`;
    }
    if (feature.implementation) {
      html += `<section class="section"><div class="section-title">Implementation</div><div class="prose">${md(feature.implementation)}</div></section>`;
    }

    if (feature.codeSnippets && feature.codeSnippets.length) {
      html += `<section class="section"><div class="section-title">Key Code</div>`;
      feature.codeSnippets.forEach((sn, i) => {
        const code = escapeHtml(sn.code || '');
        const lang = sn.lang || 'plaintext';
        html += `
          <div class="code-snippet">
            <div class="code-snippet-header">
              <span>${escapeHtml(sn.file || '')} · ${escapeHtml(lang)}</span>
              <button class="copy-btn" data-code-idx="${i}">Copy</button>
            </div>
            <pre><code class="language-${lang}">${code}</code></pre>
            ${sn.caption ? `<div class="prose" style="padding:8px 14px;font-size:13px;color:var(--text-muted);">${escapeHtml(sn.caption)}</div>` : ''}
          </div>
        `;
      });
      html += `</section>`;
    }

    if (feature.decisions && feature.decisions.length) {
      html += `<section class="section"><div class="section-title">Architecture Decisions (ADR)</div>`;
      feature.decisions.forEach(d => {
        html += `
          <div class="decision-card">
            <div class="card-title">📐 ${escapeHtml(d.title || 'Decision')}</div>
            ${d.context ? `<div class="card-row"><strong>Context:</strong> ${escapeHtml(d.context)}</div>` : ''}
            ${(d.options && d.options.length) ? `<div class="card-row"><strong>Options:</strong><ul>${d.options.map(o=>`<li>${escapeHtml(o)}</li>`).join('')}</ul></div>` : ''}
            ${d.chosen ? `<div class="card-row"><strong>Chosen:</strong> ${escapeHtml(d.chosen)}</div>` : ''}
            ${d.rationale ? `<div class="card-row"><strong>Rationale:</strong> ${escapeHtml(d.rationale)}</div>` : ''}
            ${d.consequences ? `<div class="card-row"><strong>Consequences:</strong> ${escapeHtml(d.consequences)}</div>` : ''}
          </div>
        `;
      });
      html += `</section>`;
    }

    if (feature.problems && feature.problems.length) {
      html += `<section class="section"><div class="section-title">Problems & Solutions</div>`;
      feature.problems.forEach(p => {
        html += `
          <div class="problem-card">
            <div class="card-title">🐛 ${escapeHtml(p.description || 'Problem')}</div>
            ${p.cause ? `<div class="card-row"><strong>Root cause:</strong> ${escapeHtml(p.cause)}</div>` : ''}
            ${p.solution ? `<div class="card-row"><strong>Solution:</strong> ${escapeHtml(p.solution)}</div>` : ''}
            ${p.prevention ? `<div class="card-row"><strong>Prevention:</strong> ${escapeHtml(p.prevention)}</div>` : ''}
          </div>
        `;
      });
      html += `</section>`;
    }

    if (feature.learnings && feature.learnings.length) {
      html += `<section class="section"><div class="section-title">Learnings</div><div class="prose"><ul>${feature.learnings.map(l=>`<li>${escapeHtml(l)}</li>`).join('')}</ul></div></section>`;
    }

    // Day-level sections (changelog, next steps, claude hints) on the first feature of the day
    const isFirstFeatureOfDay = (entry.features || [])[0] && (entry.features[0].id === feature.id);
    if (isFirstFeatureOfDay) {
      const cl = entry.changelog || {};
      const hasChangelog = ['added','changed','fixed','removed'].some(k => (cl[k]||[]).length);
      if (hasChangelog) {
        html += `<section class="section"><div class="section-title">Changes Summary</div><div class="changelog-grid">`;
        ['added','changed','fixed','removed'].forEach(k => {
          if ((cl[k]||[]).length) {
            html += `<div class="changelog-card ${k}"><h4>${k}</h4><ul>${cl[k].map(i=>`<li>${escapeHtml(i)}</li>`).join('')}</ul></div>`;
          }
        });
        html += `</div></section>`;
      }
      if (entry.nextSteps && entry.nextSteps.length) {
        html += `<section class="section"><div class="section-title">Next Steps</div><ul class="next-steps">${entry.nextSteps.map(s=>`<li>${escapeHtml(s)}</li>`).join('')}</ul></section>`;
      }
      if (entry.references && entry.references.length) {
        html += `<section class="section"><div class="section-title">References</div><div class="prose"><ul>${entry.references.map(r=>`<li><a href="${escapeAttr(r.url)}" target="_blank" rel="noopener">${escapeHtml(r.title)}</a></li>`).join('')}</ul></div></section>`;
      }
      if (entry.claudeHints || (entry.reusablePatterns && entry.reusablePatterns.length)) {
        html += `<div class="claude-hints"><h3>🤖 For Future Claude Code Sessions</h3>`;
        if (entry.claudeHints) html += `<p>${escapeHtml(entry.claudeHints)}</p>`;
        if (entry.reusablePatterns && entry.reusablePatterns.length) {
          html += `<p style="margin-top:10px;"><strong>Reusable patterns:</strong></p><ul style="margin-top:6px;padding-left:20px;">${entry.reusablePatterns.map(p=>`<li><code>${escapeHtml(p.name)}</code> — ${escapeHtml(p.description)} (<code>${escapeHtml(p.file||'')}</code>)</li>`).join('')}</ul>`;
        }
        html += `</div>`;
      }
    }

    content.innerHTML = html;

    // Apply syntax highlighting
    content.querySelectorAll('pre code').forEach(b => hljs.highlightElement(b));
    // Copy buttons
    content.querySelectorAll('.copy-btn').forEach(btn => {
      btn.onclick = () => {
        const idx = parseInt(btn.dataset.codeIdx);
        const code = feature.codeSnippets[idx].code;
        navigator.clipboard.writeText(code).then(() => {
          btn.textContent = 'Copied!';
          setTimeout(() => btn.textContent = 'Copy', 1500);
        });
      };
    });
  }

  function escapeHtml(s) {
    if (s == null) return '';
    return String(s).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[m]);
  }
  function escapeAttr(s) { return escapeHtml(s); }

  // Search
  document.getElementById('search-input').addEventListener('input', (e) => {
    renderSidebar(e.target.value);
  });

  // Initial render
  renderSidebar();

  // Auto-select the most recent feature
  if (data.entries.length > 0 && data.entries[0].features && data.entries[0].features.length > 0) {
    selectFeature(data.entries[0], data.entries[0].features[0]);
  }
})();
</script>
